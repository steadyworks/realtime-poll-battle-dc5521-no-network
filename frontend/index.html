<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poll Battle Arena</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: sans-serif; background: #f5f5f5; color: #333; }
      nav { background: #1a1a2e; padding: 1rem 2rem; display: flex; gap: 2rem; }
      nav a { color: #e0e0e0; text-decoration: none; font-weight: 600; }
      nav a:hover { color: #fff; }
      .container { max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
      h1 { margin-bottom: 1.5rem; }
      input, button { display: block; width: 100%; padding: 0.6rem 0.8rem; margin-bottom: 0.8rem; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; }
      button { background: #4a90e2; color: #fff; border: none; cursor: pointer; font-weight: 600; }
      button:hover { background: #357abd; }
      .error { color: #c0392b; margin-top: 0.5rem; }
      .link-box { margin-top: 1rem; padding: 0.8rem; background: #e8f4fd; border-radius: 4px; word-break: break-all; }
      .poll-card { background: #fff; border-radius: 8px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
      .vote-btn { background: #fff; color: #333; border: 2px solid #4a90e2; margin-bottom: 1rem; font-size: 1.1rem; }
      .vote-btn:hover { background: #4a90e2; color: #fff; }
      .results { margin-top: 1.5rem; }
      .tug-bar-wrap { border: 1px solid #ccc; border-radius: 4px; overflow: hidden; height: 32px; display: flex; margin-bottom: 1rem; }
      .tug-a { background: #4a90e2; transition: width 0.3s; }
      .tug-b { background: #e24a4a; transition: width 0.3s; }
      .vote-row { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
      .locked-badge { display: inline-block; background: #c0392b; color: #fff; padding: 0.3rem 0.8rem; border-radius: 4px; font-size: 0.85rem; margin-bottom: 1rem; }
      .trending-item { background: #fff; border-radius: 6px; padding: 1rem 1.5rem; margin-bottom: 0.8rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); display: flex; justify-content: space-between; align-items: center; }
      .trending-votes-badge { background: #4a90e2; color: #fff; border-radius: 20px; padding: 0.2rem 0.7rem; font-size: 0.9rem; font-weight: 600; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
